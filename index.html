<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no"
    />
    <meta name="theme-color" content="#fcfcfc" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Wish List" />
    <meta name="format-detection" content="telephone=no" />
    <title>Wish List</title>
    <link rel="icon" href="icon.png" type="image/png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <h1>Wish List</h1>
        <button id="addItemBtn" type="button" class="icon-btn" aria-label="add">+</button>
      </header>

      <nav class="tabs" id="categoryTabs" aria-label="category">
        <button type="button" class="tab-btn" data-category="Outer">Outer</button>
        <button type="button" class="tab-btn" data-category="Top">Top</button>
        <button type="button" class="tab-btn" data-category="Bottom">Bottom</button>
        <button type="button" class="tab-btn" data-category="Acc">Acc</button>
      </nav>

      <section id="itemGrid" class="item-grid" aria-label="items"></section>
    </main>

    <dialog id="itemDialog" class="dialog">
      <form id="itemForm" method="dialog" class="dialog-card">
        <div class="dialog-top">
          <div class="category-picker">
            <button type="button" id="itemCategoryBtn" class="category-btn">Type</button>
            <div id="itemCategoryList" class="category-list" hidden>
              <button type="button" class="category-option" data-category="Outer">Outer</button>
              <button type="button" class="category-option" data-category="Top">Top</button>
              <button type="button" class="category-option" data-category="Bottom">Bottom</button>
              <button type="button" class="category-option" data-category="Acc">Acc</button>
            </div>
          </div>
          <button type="button" id="closeItemBtn" class="icon-btn small" aria-label="close">×</button>
        </div>

        <label class="field">
          <span>Link</span>
          <input id="itemLinkInput" type="url" autocomplete="off" required />
        </label>

        <label class="field">
          <span>Photo</span>
          <input id="itemPhotoInput" type="file" accept="image/*" required />
        </label>

        <label class="field">
          <span>Brand</span>
          <input id="itemBrandInput" type="text" autocomplete="off" required />
        </label>

        <label class="field">
          <span>Name</span>
          <input id="itemNameInput" type="text" autocomplete="off" required />
        </label>

        <label class="field">
          <span>Price</span>
          <input id="itemPriceInput" type="text" inputmode="numeric" autocomplete="off" required />
        </label>

        <div class="actions">
          <button type="submit" class="icon-btn" aria-label="save">✓</button>
        </div>
      </form>
    </dialog>

    <dialog id="detailDialog" class="dialog">
      <form id="detailForm" method="dialog" class="dialog-card detail-card">
        <div class="dialog-top">
          <div></div>
          <button type="button" id="closeDetailBtn" class="icon-btn small" aria-label="close">×</button>
        </div>

        <label class="field">
          <span>Login Type</span>
          <div class="select-picker">
            <button type="button" id="detailLoginTypeBtn" class="category-btn">카카오톡 로그인</button>
            <div id="detailLoginTypeList" class="category-list" hidden>
              <button type="button" class="category-option" data-login-type="kakao">카카오톡 로그인</button>
              <button type="button" class="category-option" data-login-type="other">기타</button>
            </div>
          </div>
        </label>

        <div id="detailAuthFields" class="detail-auth-fields" hidden>
          <label class="field">
            <span>Site ID</span>
            <input id="detailSiteIdInput" type="text" autocomplete="off" />
          </label>

          <label class="field">
            <span>Password</span>
            <input id="detailPasswordInput" type="password" autocomplete="off" />
          </label>
        </div>

        <div class="actions">
          <button type="submit" class="icon-btn" aria-label="save">✓</button>
        </div>
      </form>
    </dialog>

    <dialog id="cropOverlay" class="dialog crop-overlay">
      <form id="cropForm" class="dialog-card crop-card">
        <div class="dialog-top">
          <div></div>
          <button type="button" id="closeCropBtn" class="icon-btn small" aria-label="close">×</button>
        </div>

        <div class="crop-stage">
          <div id="cropImage" class="crop-image"></div>
        </div>

        <label class="field">
          <span>Zoom</span>
          <input id="cropScaleInput" type="range" min="1" max="2.5" step="0.01" value="1" />
        </label>

        <label class="field">
          <span>X</span>
          <input id="cropXInput" type="range" min="-100" max="100" step="1" value="0" />
        </label>

        <label class="field">
          <span>Y</span>
          <input id="cropYInput" type="range" min="-100" max="100" step="1" value="0" />
        </label>

        <div class="actions">
          <button type="submit" class="icon-btn" aria-label="save">✓</button>
        </div>
      </form>
    </dialog>

    <template id="itemTemplate">
      <article class="item-card" tabindex="0">
        <div class="card-photo-wrap">
          <img class="item-photo" alt="" loading="lazy" />
          <button type="button" class="item-menu-btn" aria-label="edit">⋮</button>
          <div class="item-action-menu" hidden>
            <button type="button" class="item-action-edit">수정</button>
            <button type="button" class="item-action-delete">삭제</button>
          </div>
        </div>
        <div class="card-meta">
          <div class="item-brand"></div>
          <div class="item-name"></div>
          <div class="price-row">
            <span class="item-price"></span>
            <button type="button" class="cart-btn" aria-label="cart">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 18a2 2 0 1 0 0.001 3.999A2 2 0 0 0 7 18Zm10 0a2 2 0 1 0 0.001 3.999A2 2 0 0 0 17 18ZM6.2 5.5 6.6 8h14.7l-1.2 6.1a2 2 0 0 1-2 1.6H8.2a2 2 0 0 1-2-1.6L4.6 2H1.5V0H6l.2 1.4H24v2H6.5l.4 2.1Z" />
              </svg>
            </button>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
